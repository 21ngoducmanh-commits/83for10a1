<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gia Thảo</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #fff0f3; margin: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; text-align: center;
        }
        .content-box { width: 90%; max-width: 500px; animation: zoomIn 0.6s ease; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        
        h2 { color: #c2185b; font-size: 20px; padding: 0 20px; line-height: 1.5; }
        
        /* Khung tròn tối ưu cho ảnh */
        .circle-frame {
            width: 280px; height: 280px;
            margin: 20px auto; border-radius: 50%;
            border: 6px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            background: #eee;
        }
        .circle-frame img {
            width: 100%; height: 100%;
            object-fit: cover; /* Giúp ảnh luôn lấp đầy hình tròn mà không bị méo */
        }
        
        .btn-back {
            display: inline-block; margin-top: 30px;
            text-decoration: none; background: #c2185b;
            color: white; padding: 12px 30px;
            border-radius: 50px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(194, 24, 91, 0.3);
        }
    </style>
</head>
<body>

    <div class="content-box">
        <h2>Chúc cậu ngày 8/3 vui vẻ! Mong niềm vui của cậu sẽ tăng theo cấp số nhân, còn nỗi buồn thì tiến về giới hạn 0.🌸</h2>

        <div class="circle-frame">
            <img src="anh32.jpg" alt="8/3">
        </div>

        <a href="index.html" class="btn-back">⬅ Quay lại</a>
    </div>

</body>
</html>
